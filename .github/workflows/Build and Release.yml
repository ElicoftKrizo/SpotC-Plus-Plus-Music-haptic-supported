name: Build and Release (+ Custom Haptics)

# ──────────────────────────────────────────────────────────────────────────────
# This is a fork of SpotCompiled/SpotC-Plus-Plus "Build and Release" workflow
# with an added "Custom Haptics" pipeline that:
#   1. Installs the haptic_converter Python package (librosa + dependencies)
#   2. Accepts an optional ZIP of audio files as a workflow input
#   3. Converts all audio files → .ahap haptic patterns
#   4. Injects the .ahap files into both release IPAs before packaging
# ──────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      SPOTURL:
        description: 'Direct URL to Spotify .ipa'
        required: true
      CHANGEVERSION:
        description: 'SpotC++ Version Number'
        required: false
      USEACTIONSEEVEE:
        description: 'Get EeveeSpotify from latest EeveeSpotify build action'
        required: true
        default: false
        type: boolean
      EEVEEVERSION:
        description: 'EeveeSpotify Version'
        required: false
      EEVEEREPO:
        description: 'Override repo for EeveeSpotify'
        required: false

      # ── NEW: Haptics inputs ───────────────────────────────────────────────
      HAPTICS_AUDIO_ZIP_URL:
        description: |
          (Optional) Direct URL to a .zip of audio files (MP3/WAV/FLAC/AAC/M4A).
          Each file will be converted to a .ahap haptic pattern and injected
          into the IPA as  Payload/Spotify.app/CustomHaptics/<name>.ahap
        required: false
      HAPTICS_MIN_TRANSIENT:
        description: 'Min transient intensity (0-1, default 0.05)'
        required: false
        default: '0.05'
      HAPTICS_MIN_CONTINUOUS:
        description: 'Min continuous intensity (0-1, default 0.10)'
        required: false
        default: '0.10'

jobs:
  build:
    runs-on: macos-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # ── Environment setup ────────────────────────────────────────────────────

    - name: Set up variables
      id: setup
      run: |
        echo "EEVEEVERSION=${{ github.event.inputs.EEVEEVERSION }}" >> $GITHUB_ENV
        echo "CHANGEVERSION=${{ github.event.inputs.CHANGEVERSION }}" >> $GITHUB_ENV
        echo "SPOTURL=${{ github.event.inputs.SPOTURL }}" >> $GITHUB_ENV
        echo "VT_ENABLED=${{ secrets.VIRUSTOTALKEY != '' }}" >> $GITHUB_ENV
        echo "CATBOXHASH_ENABLED=${{ secrets.CATBOXHASH != '' }}" >> $GITHUB_ENV

    - name: Set Workflow URL
      run: |
        echo "WORKFLOWURL=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_ENV

    - name: Set EeveeSpotify Repo
      run: |
        if [ -n "${{ github.event.inputs.EEVEEREPO }}" ]; then
          EEVEEREPO=$(echo "${{ github.event.inputs.EEVEEREPO }}" | sed -E 's|https://github.com/([^/]+)/([^/]+)|\1/\2|')
        else
          EEVEEREPO="whoeevee/EeveeSpotifyReborn"
        fi
        echo "EEVEEREPO=$EEVEEREPO" >> $GITHUB_ENV

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    # ── Install Cyan (tweak injector) ────────────────────────────────────────

    - name: Install Cyan
      run: pipx install --force https://github.com/SpotCompiled/pyzule-rw/archive/main.zip

    # ── NEW: Install haptic converter dependencies ────────────────────────────

    - name: Install haptic converter dependencies
      run: |
        pip install librosa soundfile numpy --break-system-packages -q
        echo "Haptic converter dependencies installed ✅"

    - name: Create Build Components folder
      run: mkdir -p "Build Components"

    # ── Download source components (unchanged from original) ─────────────────

    - name: Set EEVEETAG
      run: |
        if [ -z "${{ env.EEVEEVERSION }}" ]; then
          EEVEETAG=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" https://api.github.com/repos/${{ env.EEVEEREPO }}/releases/latest | jq -r .tag_name)
        else
          EEVEEVERSION="${{ env.EEVEEVERSION }}"
          tags=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" https://api.github.com/repos/${{ env.EEVEEREPO }}/tags | jq -r '.[].name')
          for tag in $tags; do
            if [[ $tag == *"$EEVEEVERSION"* ]]; then
              EEVEETAG=$tag; break
            fi
          done
          [ -z "$EEVEETAG" ] && echo "No matching tag for $EEVEEVERSION" && exit 1
        fi
        echo "EEVEETAG=$EEVEETAG" >> $GITHUB_ENV

    - name: Download Spotify IPA
      run: |
        curl -LJO "${{ github.event.inputs.SPOTURL }}"
        downloaded_file=$(ls -t | head -n1)
        mv "$downloaded_file" "Build Components/"
        echo "spotifypath=Build Components/$downloaded_file" >> $GITHUB_ENV

    - name: Download and process Orion
      run: |
        curl -sSL https://repo.chariz.com/Packages -o Packages
        ORIONVERSION=$(awk 'BEGIN{RS="";FS="\n";hv=""} $1~/^Package: dev.theos.orion14$/ && $0~/Architecture: iphoneos-arm([^6]|$)/{for(i=1;i<=NF;i++){if($i~/^Version: /){split($i,a," ");v=a[2];if(hv==""||v>hv)hv=v}}} END{print hv}' Packages)
        FILENAME=$(awk 'BEGIN{RS="";FS="\n";hv=""} $1~/^Package: dev.theos.orion14$/ && $0~/Architecture: iphoneos-arm/{cv="";cf="";for(i=1;i<=NF;i++){if($i~/^Version: /){split($i,a," ");v=a[2];if(cv==""||v>cv){cv=v}}else if($i~/^Filename: /){split($i,a," ");cf=a[2]}}if(hv==""||cv>hv){hv=cv;hf=cf}} END{print hf}' Packages)
        curl -LJO "https://repo.chariz.com/$FILENAME"
        downloaded_file=$(ls -t | head -n1)
        mv "$downloaded_file" "Build Components/"
        rm -f Packages
        echo "orion=Build Components/$downloaded_file" >> $GITHUB_ENV
        echo "ORIONVERSION=$ORIONVERSION" >> $GITHUB_ENV

    - name: Download and process Sposify
      run: |
        curl -sSL https://repo.dynastic.co/Packages -o Packages
        SPOSIFYVERSION=$(awk 'BEGIN{RS="";FS="\n";hv=""} $1~/^Package: com.spos$/ && $0~/Architecture: iphoneos-arm([^6]|$)/{for(i=1;i<=NF;i++){if($i~/^Version: /){split($i,a," ");v=a[2];if(hv==""||v>hv)hv=v}}} END{print hv}' Packages)
        FILENAME=$(awk 'BEGIN{RS="";FS="\n";hv=""} $1~/^Package: com.spos$/ && $0~/Architecture: iphoneos-arm/{cv="";cf="";for(i=1;i<=NF;i++){if($i~/^Version: /){split($i,a," ");v=a[2];if(cv==""||v>cv)cv=v}else if($i~/^Filename: /){split($i,a," ");cf=a[2]}}if(hv==""||cv>hv){hv=cv;hf=cf}} END{print hf}' Packages)
        curl -LJO "https://repo.dynastic.co/$FILENAME"
        downloaded_file=$(ls -t | head -n1)
        mv "$downloaded_file" "Build Components/"
        rm -f Packages
        echo "sposify=Build Components/$downloaded_file" >> $GITHUB_ENV
        echo "SPOSIFYVERSION=$SPOSIFYVERSION" >> $GITHUB_ENV

    - name: Download and process SposifyFix
      run: |
        curl -sSL https://level3tjg.me/repo/Packages -o Packages
        SPOSIFYFIXVERSION=$(awk 'BEGIN{RS="";FS="\n";hv=""} $1~/^Package: com.level3tjg.sposifyfix$/ && $0~/Architecture: iphoneos-arm([^6]|$)/{for(i=1;i<=NF;i++){if($i~/^Version: /){split($i,a," ");v=a[2];if(hv==""||v>hv)hv=v}}} END{print hv}' Packages)
        FILENAME=$(awk 'BEGIN{RS="";FS="\n";hv=""} $1~/^Package: com.level3tjg.sposifyfix$/ && $0~/Architecture: iphoneos-arm/{cv="";cf="";for(i=1;i<=NF;i++){if($i~/^Version: /){split($i,a," ");v=a[2];if(cv==""||v>cv)cv=v}else if($i~/^Filename: /){split($i,a," ");cf=a[2]}}if(hv==""||cv>hv){hv=cv;hf=cf}} END{print hf}' Packages)
        curl -LJO "https://level3tjg.me/repo/$FILENAME"
        downloaded_file=$(ls -t | head -n1)
        mv "$downloaded_file" "Build Components/"
        rm -f Packages
        echo "sposifyfix=Build Components/$downloaded_file" >> $GITHUB_ENV
        echo "SPOSIFYFIXVERSION=$SPOSIFYFIXVERSION" >> $GITHUB_ENV

    - name: Download EeveeSpotify .deb (release)
      if: ${{ github.event.inputs.USEACTIONSEEVEE == 'false' }}
      run: |
        eevee_asset=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" https://api.github.com/repos/${{ env.EEVEEREPO }}/releases/tags/${{ env.EEVEETAG }} | jq -r '.assets[] | select(.name | startswith("com.eevee.spotify") and endswith("iphoneos-arm.deb")).browser_download_url')
        curl -LJO "$eevee_asset"
        downloaded_file=$(ls -t | head -n1)
        mv "$downloaded_file" "Build Components/"
        echo "eevee-arm=Build Components/$downloaded_file" >> $GITHUB_ENV

    - name: Download EeveeSpotify .deb (actions artifact)
      if: ${{ github.event.inputs.USEACTIONSEEVEE == 'true' }}
      run: |
        workflow_run_id=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/repos/${{ env.EEVEEREPO }}/actions/workflows/build-swift.yml/runs?status=success&per_page=1" | jq -r '.workflow_runs[0].id')
        eevee_asset=$(curl -sL -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" https://api.github.com/repos/${{ env.EEVEEREPO }}/actions/runs/$workflow_run_id/artifacts | jq -r '.artifacts[] | select(.name | test("debug|arm64") | not) | .archive_download_url')
        curl -LJ -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" "$eevee_asset" -o "eeveespotfiyactionsasset.zip"
        unzip -q "eeveespotfiyactionsasset.zip" -d extracted_files
        downloaded_file=$(find extracted_files -type f -name "*.deb" -print -quit)
        mv "$downloaded_file" "Build Components/"
        rm -rf extracted_files
        echo "eevee-arm=Build Components/$(basename "$downloaded_file")" >> $GITHUB_ENV
        echo "eeveeAssetLink=$eevee_asset" >> $GITHUB_ENV

    - name: Get EeveeSpotify release name
      run: |
        RELEASE_TITLE=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/repos/${{ env.EEVEEREPO }}/releases/tags/${{ env.EEVEETAG }}" | jq -r '.name')
        echo "EEVEEVERSIONNAME=$RELEASE_TITLE" >> $GITHUB_ENV

    - name: Download SwiftProtobuf .deb
      run: |
        protobuf_asset=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" https://api.github.com/repos/${{ env.EEVEEREPO }}/releases/tags/${{ env.EEVEETAG }} | jq -r '.assets[] | select(.name | startswith("org.swift.protobuf.swiftprotobuf") and endswith("iphoneos-arm.deb")).browser_download_url')
        curl -LJO "$protobuf_asset"
        downloaded_file=$(ls -t | head -n1)
        mv "$downloaded_file" "Build Components/"
        echo "swiftprotobuf=Build Components/$downloaded_file" >> $GITHUB_ENV
        filename=$(basename "${protobuf_asset}")
        protobuf_version=$(echo "${filename}" | sed -n 's/org.swift.protobuf.swiftprotobuf_\([^-]*\)_iphoneos-arm.deb/\1/p')
        echo "SWIFTPROTOBUFVERSION=${protobuf_version}" >> $GITHUB_ENV

    - name: Clone OpenSpotifySafariExtension
      run: |
        git clone https://github.com/whoeevee/OpenSpotifySafariExtension
        cp -R OpenSpotifySafariExtension/OpenSpotifySafariExtension.appex "Build Components/OpenSpotifySafariExtension.appex"
        echo "EXTCOMMIT=$(git -C OpenSpotifySafariExtension rev-parse --short HEAD)" >> $GITHUB_ENV
        echo "OSSEXT=Build Components/OpenSpotifySafariExtension.appex" >> $GITHUB_ENV

    - name: Read Spotify IPA info
      run: |
        cp "${{ env.spotifypath }}" "Build Components/SpotifyAnylises.zip"
        unzip "Build Components/SpotifyAnylises.zip" -d "Build Components"
        cp "Build Components/Payload/Spotify.app/Info.plist" "Build Components/Info.plist"
        VANILLASPOTIFYVERSION=$(/usr/libexec/PlistBuddy -c "Print :SpotifyVersionShort" "Build Components/Info.plist")
        MIN_IOS_VERSION=$(/usr/libexec/PlistBuddy -c 'Print :MinimumOSVersion' "Build Components/Info.plist")
        echo "VANILLASPOTIFYVERSION=$VANILLASPOTIFYVERSION" >> $GITHUB_ENV
        echo "MIN_IOS_VERSION=$MIN_IOS_VERSION" >> $GITHUB_ENV
        rm -rf "Build Components/Payload" "Build Components/SpotifyAnylises.zip" "Build Components/Info.plist"

    - name: Set Change Version
      run: |
        CHANGEVERSION="${{ github.event.inputs.CHANGEVERSION }}"
        if [ -z "$CHANGEVERSION" ]; then
          latest_tag=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" https://api.github.com/repos/SpotCompiled/SpotC-Plus-Plus/releases/latest | jq -r .tag_name)
          version=${latest_tag#v}
          IFS='.' read -r -a vp <<< "$version"
          CHANGEVERSION="${vp[0]}.${vp[1]}.$((${vp[2]} + 1))"
        fi
        echo "CHANGEVERSION=$CHANGEVERSION" >> $GITHUB_ENV

    - name: Set Components Path
      run: echo "componentspath=Build Components" >> $GITHUB_ENV

    # ── NEW: Build SpotHaptics tweak .deb ────────────────────────────────────
    # Installs Theos (if not cached), compiles SpotHaptics via Orion/Swift,
    # and produces a .deb that Cyan will inject alongside the other tweaks.

    # ╔══════════════════════════════════════════════════════════════════════╗
    # ║  FIX: Install ldid — the Theos code-signing dependency             ║
    # ║                                                                      ║
    # ║  ROOT CAUSE of "bash: ldid: command not found" (exit 127):          ║
    # ║  The manual `git clone` of Theos below does NOT run the official    ║
    # ║  Theos bootstrap script, which is the only place `brew install      ║
    # ║  ldid` would normally be called. Without it, ldid is simply never   ║
    # ║  installed on the runner, so every Theos signing invocation fails.  ║
    # ║                                                                      ║
    # ║  This step is intentionally UNCONDITIONAL and placed BEFORE the     ║
    # ║  Theos cache/install steps so ldid is present whether Theos is      ║
    # ║  freshly cloned OR restored from cache.  The $GITHUB_PATH append    ║
    # ║  ensures /opt/homebrew/bin is in PATH for ALL subsequent steps,     ║
    # ║  including every bash subshell that Theos's signing rules spawn.    ║
    # ╚══════════════════════════════════════════════════════════════════════╝
    - name: Install ldid (Theos code-signing dependency)
      run: |
        brew install ldid
        # Persist /opt/homebrew/bin in PATH for every subsequent step,
        # including subshells spawned by make and Theos signing scripts.
        echo "/opt/homebrew/bin" >> $GITHUB_PATH
        echo "✅ ldid installed: $(brew list --versions ldid)"

    - name: Cache Theos
      id: cache-theos
      uses: actions/cache@v4
      with:
        path: /opt/theos
        key: theos-${{ runner.os }}-v1

    - name: Install Theos
      if: steps.cache-theos.outputs.cache-hit != 'true'
      run: |
        # Manually clone Theos directly into /opt/theos
        sudo git clone --recursive https://github.com/theos/theos.git /opt/theos

        # Clone ONLY the iOS 16.5 SDK directly into the sdks directory using git depth
        sudo mkdir -p /opt/theos/sdks
        sudo git clone --depth=1 https://github.com/theos/sdks.git /tmp/theos-sdks
        sudo mv /tmp/theos-sdks/iPhoneOS16.5.sdk /opt/theos/sdks/
        sudo rm -rf /tmp/theos-sdks

        # Set proper folder permissions for the runner
        sudo chown -R $USER /opt/theos
        echo "Theos and iOS SDK manually installed successfully! ✅"

    # ╔══════════════════════════════════════════════════════════════════════╗
    # ║  FIX: Belt-and-suspenders PATH + LDID exports in the build step    ║
    # ║                                                                      ║
    # ║  Even after the $GITHUB_PATH fix above, explicitly re-exporting     ║
    # ║  PATH and LDID here guarantees the correct values are in scope for  ║
    # ║  `make` itself AND every child process it forks — including the     ║
    # ║  deep Theos signing.mk subshell that previously couldn't see ldid. ║
    # ╚══════════════════════════════════════════════════════════════════════╝
    - name: Build SpotHaptics tweak
      run: |
        cd SpotHaptics
        export THEOS=/opt/theos
        # Belt-and-suspenders: re-export PATH and LDID explicitly so that
        # make and every signing subshell it spawns can resolve ldid.
        export PATH="/opt/homebrew/bin:$PATH"
        export LDID=/opt/homebrew/bin/ldid
        echo "==> ldid sanity check: $(which ldid) — version: $(ldid 2>&1 | head -1 || true)"
        make package FINALPACKAGE=1 2>&1
        DEB=$(find packages -name "*.deb" | sort | tail -n1)
        echo "SpotHaptics .deb: $DEB"
        cp "$DEB" "../Build Components/SpotHaptics.deb"
        echo "spothaptics=Build Components/SpotHaptics.deb" >> $GITHUB_ENV
        echo "✅ SpotHaptics.deb ready"

    # ── NEW: Custom Haptics generation ───────────────────────────────────────

    - name: Download and convert custom audio → .ahap
      if: ${{ github.event.inputs.HAPTICS_AUDIO_ZIP_URL != '' }}
      run: |
        echo "📥 Downloading audio ZIP …"
        mkdir -p custom_audio haptics_output

        AUDIO_URL="${{ github.event.inputs.HAPTICS_AUDIO_ZIP_URL }}"

        # ── Host-specific direct-link rewriting ──────────────────────────────
        # Many file-sharing hosts redirect through an HTML confirmation page
        # instead of serving raw bytes, even with -L.  Rewrite known patterns
        # to their direct-download equivalents before curling.

        # Google Drive: /file/d/<ID>/view  →  export?id=<ID>&confirm=t
        if echo "$AUDIO_URL" | grep -q "drive.google.com/file/d/"; then
          FILE_ID=$(echo "$AUDIO_URL" | sed -E 's|.*/file/d/([^/]+).*|\1|')
          AUDIO_URL="https://drive.google.com/uc?export=download&id=${FILE_ID}&confirm=t"
          echo "🔗 Rewritten as Google Drive direct-download URL (id=${FILE_ID})"
        fi

        # Dropbox: ?dl=0  →  ?dl=1
        if echo "$AUDIO_URL" | grep -q "dropbox.com"; then
          AUDIO_URL=$(echo "$AUDIO_URL" | sed 's/?dl=0/?dl=1/g')
          echo "🔗 Rewritten as Dropbox direct-download URL"
        fi

        # GitHub release asset: ensure we're not hitting an HTML page
        # (GitHub release URLs work fine with -L; no rewrite needed)

        # ── Download with full diagnostic headers ────────────────────────────
        HTTP_CODE=$(curl -L \
          --fail-with-body \
          --retry 3 --retry-delay 5 \
          -H "Accept: application/zip, application/octet-stream, */*" \
          -A "Mozilla/5.0 (compatible; GitHub-Actions-Bot)" \
          -w "%{http_code}" \
          -o custom_audio.zip \
          "$AUDIO_URL" 2>&1) || true

        echo "HTTP response code: $HTTP_CODE"

        # ── Validate the download is actually a ZIP ──────────────────────────
        # ZIP files always begin with the magic bytes  PK\x03\x04  (hex 504B0304).
        MAGIC=$(xxd -l 4 custom_audio.zip 2>/dev/null | awk '{print $2$3}' | tr -d ' ' | head -c8)
        echo "File magic bytes: $MAGIC"

        if [ "$MAGIC" != "504b0304" ]; then
          echo ""
          echo "❌ ERROR: The downloaded file is NOT a valid ZIP archive."
          echo "   Magic bytes expected: 504b0304  —  got: $MAGIC"
          echo ""
          echo "   First 512 bytes of what was downloaded (likely HTML or redirect page):"
          echo "   ──────────────────────────────────────────────────────────────────────"
          head -c 512 custom_audio.zip | cat -v
          echo ""
          echo "   SOLUTIONS:"
          echo "   1. Use a direct-download URL (not a preview/share link)."
          echo "   2. GitHub Releases, Catbox.moe, and raw file CDNs all work reliably."
          echo "   3. For Google Drive, confirm the file is publicly shared and the"
          echo "      URL format is /file/d/<ID>/view — the rewriter handles the rest."
          echo "   4. For Dropbox, ensure the URL ends in ?dl=0 — the rewriter converts"
          echo "      it to ?dl=1 automatically."
          exit 1
        fi

        echo "✅ Download verified as a valid ZIP archive ($(du -sh custom_audio.zip | cut -f1))."
        unzip -q custom_audio.zip -d custom_audio
        rm custom_audio.zip

        echo "🎵 Found audio files:"
        find custom_audio -type f | head -40

        echo ""
        echo "🎛️  Converting to .ahap …"
        python3 haptic_converter/batch_convert.py \
          custom_audio \
          haptics_output \
          --workers 2 \
          --min-transient-intensity ${{ github.event.inputs.HAPTICS_MIN_TRANSIENT }} \
          --min-continuous-intensity ${{ github.event.inputs.HAPTICS_MIN_CONTINUOUS }}

        HAPTIC_COUNT=$(find haptics_output -name "*.ahap" | wc -l | tr -d ' ')
        echo "HAPTIC_COUNT=$HAPTIC_COUNT" >> $GITHUB_ENV
        echo "HAPTICS_ENABLED=true" >> $GITHUB_ENV
        echo "✅  $HAPTIC_COUNT haptic pattern(s) generated."

    - name: Set haptics disabled flag (no audio provided)
      if: ${{ github.event.inputs.HAPTICS_AUDIO_ZIP_URL == '' }}
      run: |
        echo "HAPTICS_ENABLED=false" >> $GITHUB_ENV
        echo "ℹ️  No HAPTICS_AUDIO_ZIP_URL provided — skipping haptic generation."

    # ── Run Cyan to patch the IPA ────────────────────────────────────────────

    - name: Run Cyan (standard)
      run: |
        Cyan -i "${{ env.spotifypath }}" \
             -o "${{ env.componentspath }}/SpotC++.v${{ env.CHANGEVERSION }}_v${{ env.VANILLASPOTIFYVERSION }}.ipa" \
             -v ${{ env.CHANGEVERSION }} \
             -f "${{ env.sposifyfix }}" "${{ env.sposify }}" "${{ env.OSSEXT }}" \
                "${{ env.orion }}" "${{ env.swiftprotobuf }}" "${{ env.eevee-arm }}" \
                "${{ env.spothaptics }}" \
             -u -w
        echo "patchedspotify=${{ env.componentspath }}/SpotC++.v${{ env.CHANGEVERSION }}_v${{ env.VANILLASPOTIFYVERSION }}.ipa" >> $GITHUB_ENV

    - name: Run Cyan (AltStore)
      run: |
        Cyan -i "${{ env.spotifypath }}" \
             -o "${{ env.componentspath }}/SpotC++.v${{ env.CHANGEVERSION }}_v${{ env.VANILLASPOTIFYVERSION }}_ALTSTORESOURCE_ONLY.ipa" \
             -v ${{ env.CHANGEVERSION }} \
             -b com.yodaluca23.SpotCPlusPlus \
             -f "${{ env.sposifyfix }}" "${{ env.sposify }}" "${{ env.OSSEXT }}" \
                "${{ env.orion }}" "${{ env.swiftprotobuf }}" "${{ env.eevee-arm }}" \
                "${{ env.spothaptics }}" \
             -u -w
        echo "altpatchedspotify=${{ env.componentspath }}/SpotC++.v${{ env.CHANGEVERSION }}_v${{ env.VANILLASPOTIFYVERSION }}_ALTSTORESOURCE_ONLY.ipa" >> $GITHUB_ENV

    # ── NEW: Inject .ahap files into both IPAs ────────────────────────────────

    - name: Inject haptic patterns into standard IPA
      if: ${{ env.HAPTICS_ENABLED == 'true' }}
      run: |
        echo "💉 Injecting ${{ env.HAPTIC_COUNT }} haptic pattern(s) into standard IPA …"
        python3 haptic_converter/inject_haptics.py \
          "${{ env.patchedspotify }}" \
          haptics_output \
          "${{ env.patchedspotify }}"
        echo "✅  Haptics injected into standard IPA."

    - name: Inject haptic patterns into AltStore IPA
      if: ${{ env.HAPTICS_ENABLED == 'true' }}
      run: |
        echo "💉 Injecting ${{ env.HAPTIC_COUNT }} haptic pattern(s) into AltStore IPA …"
        python3 haptic_converter/inject_haptics.py \
          "${{ env.altpatchedspotify }}" \
          haptics_output \
          "${{ env.altpatchedspotify }}"
        echo "✅  Haptics injected into AltStore IPA."

    # ── Upload converted .ahap files as build artifact ───────────────────────

    - name: Upload generated .ahap files as artifact
      if: ${{ env.HAPTICS_ENABLED == 'true' }}
      uses: actions/upload-artifact@v4
      with:
        name: CustomHapticPatterns
        path: haptics_output/

    # ── Upload to Catbox ─────────────────────────────────────────────────────

    - name: Upload to Catbox (With Hash)
      if: ${{ env.CATBOXHASH_ENABLED == 'true' }}
      run: |
        RELEASEURL=$(curl -F "reqtype=fileupload" -F "userhash=${{ secrets.CATBOXHASH }}" -F "fileToUpload=@${{ env.patchedspotify }}" https://catbox.moe/user/api.php)
        echo "RELEASEURL=$RELEASEURL" >> $GITHUB_ENV
        RELEASEURLALTSTORE=$(curl -F "reqtype=fileupload" -F "userhash=${{ secrets.CATBOXHASH }}" -F "fileToUpload=@${{ env.altpatchedspotify }}" https://catbox.moe/user/api.php)
        echo "RELEASEURLALTSTORE=$RELEASEURLALTSTORE" >> $GITHUB_ENV

    - name: Upload to Catbox (Without Hash)
      if: ${{ env.CATBOXHASH_ENABLED == 'false' }}
      run: |
        RELEASEURL=$(curl -F "reqtype=fileupload" -F "fileToUpload=@${{ env.patchedspotify }}" https://catbox.moe/user/api.php)
        echo "RELEASEURL=$RELEASEURL" >> $GITHUB_ENV
        RELEASEURLALTSTORE=$(curl -F "reqtype=fileupload" -F "fileToUpload=@${{ env.altpatchedspotify }}" https://catbox.moe/user/api.php)
        echo "RELEASEURLALTSTORE=$RELEASEURLALTSTORE" >> $GITHUB_ENV

    # ── ChangeLog ─────────────────────────────────────────────────────────────

    - name: Construct ChangeLog
      run: |
        echo "## ChangeLog" > changelog.txt
        BULLET=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" https://api.github.com/repos/${{ env.EEVEEREPO }}/releases/tags/${{ env.EEVEETAG }} | jq -r '.body' | sed -n 's/^[[:space:]]*[*-+] //p' | grep -v '^$' | head -n 1)
        echo "- $BULLET" >> changelog.txt
        echo "" >> changelog.txt
        if [ "${{ env.HAPTICS_ENABLED }}" = "true" ]; then
          echo "- ✨ **Custom Haptics**: ${{ env.HAPTIC_COUNT }} song haptic pattern(s) embedded (.ahap via Core Haptics)" >> changelog.txt
        fi
        echo "***" >> changelog.txt
        echo "App .ipa modified using [SpotC-HapticMod fork](https://github.com/SpotCompiled/SpotC-Plus-Plus) with [the GitHub Action Workflow.](${{ env.WORKFLOWURL }})" >> changelog.txt

    # ── Draft Release ─────────────────────────────────────────────────────────

    - name: Create Draft Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "v${{ env.CHANGEVERSION }}"
        name: "SpotC++ v${{ env.CHANGEVERSION }}"
        draft: true
        body_path: changelog.txt
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
